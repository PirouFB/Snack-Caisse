<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768, initial-scale=1.0">
<title>Caisse</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo-vague.png">
    <div id="total">0.00€</div>
    <img src="logo-manga.png">
  </div>

  <div class="row center">
    <div class="card" onclick="selectMain('Crêpes',2.5,this)">
      <img src="icon-crepe.png"><p>Crêpes</p>
    </div>
    <div class="card" onclick="selectMain('Panini',3.5,this)">
      <img src="icon-panini.png"><p>Panini</p>
    </div>
    <div class="card" onclick="selectMain('Glace',0,this)">
      <img src="icon-glace.png"><p>Glace</p>
    </div>
  </div>

  <div id="dynamic"></div>

  <div class="footer">
    <button onclick="addToCart()">Ajouter</button>
    <button class="reset" onclick="resetAll()">RESET</button>
    <div id="cart"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
