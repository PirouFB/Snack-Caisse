<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caisse Snack</title>
<style>
body { 
    font-family: Arial, sans-serif; 
    background: #fff8f0;   
    color: #4c464e;        
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center; 
}

.logo-container { margin: 20px 0; text-align:center; }
.logo { width: 150px; height: 150px; }

.top-bar { margin-bottom: 20px; text-align:center; }

button { 
    font-size: 16px; 
    padding: 10px; 
    margin: 5px; 
    border: 2px solid transparent; 
    border-radius: 10px; 
    width: 140px; 
    cursor: pointer; 
    background: #b9e3ed;   
    color: #4c464e;         
    transition: 0.3s;       
}

button.selected { 
    background: #fec1c3;   
    border: 3px solid #fec1c3;
    box-shadow: 0 0 10px #fec1c3;
}

.total, .grand-total { font-size: 32px; margin: 10px; }
.hidden { display: none; }
.section { margin-top: 20px; text-align:center; }

.action-buttons { margin:30px 0 50px; }
button.add-order { background:#f5d6af; color:#4c464e; width:200px; }
button.reset { background:#ed7985; color:white; width:200px; margin-left:20px; }

.bottom-bar { display:flex; justify-content:space-around; width:100%; margin-top:auto; padding:20px; flex-wrap:wrap; }
.bottom-bar .grand-total, .bottom-bar .orders { text-align:center; }
.bottom-bar .orders ul { list-style:none; padding:0; }
.bottom-bar .orders li { margin:5px 0; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div class="logo-container">
    <img src="logo.png" alt="Logo.png" class="logo">
</div>

<div class="top-bar">
    <div class="total">Commande en cours: <span id="total">0.00</span> €</div>
</div>

<h2>Produits</h2>
<button class="product" data-price="2.5" onclick="selectProduct(this)">Crêpe</button>
<button class="product" data-price="3.5" onclick="selectProduct(this)">Panini Gelato</button>
<button class="product" data-price="0" onclick="selectProduct(this)">Glace</button>

<!-- Choix Glace -->
<div id="iceChoice" class="hidden section">
<h2>Choisir : Pot ou Cornet</h2>
<button class="option" data-price="0" onclick="selectSingle(this,'iceType')">Pot</button>
<button class="option" data-price="0" onclick="selectSingle(this,'iceType')">Cornet</button>
</div>

<div id="scoopChoice" class="hidden section">
<h2>Nombre de boules</h2>
<button class="option" data-price="2.5" onclick="selectSingle(this,'scoop')">1 boule</button>
<button class="option" data-price="4" onclick="selectSingle(this,'scoop')">2 boules</button>
<button class="option" data-price="5" onclick="selectSingle(this,'scoop')">3 boules</button>
</div>

<div id="flavorChoice" class="hidden section">
<h2>Choisir un parfum (1 par boule)</h2>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Menthe</button>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Fraise</button>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Citron</button>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Chocolat</button>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Noix de coco</button>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Vanille</button>
<button class="option" data-price="0" onclick="toggleFlavor(this)">Caramel</button>
</div>

<div id="nappageSection" class="hidden section">
<h2>Nappage (1€)</h2>
<button class="option" data-price="1" onclick="toggle(this)">Chocolat</button>
<button class="option" data-price="1" onclick="toggle(this)">Caramel</button>
<button class="option" data-price="1" onclick="toggle(this)">Nutella</button>
<button class="option" data-price="1" onclick="toggle(this)">Fraise</button>
</div>

<div id="toppingSection" class="hidden section">
<h2>TOPPING (1€)</h2>
<button class="option" data-price="1" onclick="toggle(this)">Kinder Bueno</button>
<button class="option" data-price="1" onclick="toggle(this)">Chantilly</button>
<button class="option" data-price="1" onclick="toggle(this)">Oréo</button>
<button class="option" data-price="1" onclick="toggle(this)">Coco râpé</button>
</div>

<div id="optionsSection" class="hidden section">
<h2>OPTIONS (1€)</h2>
<button class="option" data-price="1" onclick="toggle(this)">Morceaux de fraise</button>
<button class="option" data-price="1" onclick="toggle(this)">Morceaux de banane</button>
<button class="option" data-price="1" data-type="mini-glace" onclick="toggleMiniGlace(this)">Boule de glace</button>

<div id="miniFlavor" class="hidden section" style="margin-top:10px;">
<h3>Choisir un parfum (1)</h3>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Menthe</button>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Fraise</button>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Citron</button>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Chocolat</button>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Noix de coco</button>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Vanille</button>
<button class="option" data-price="0" onclick="toggleMiniFlavor(this)">Caramel</button>
</div>
</div>

<div class="action-buttons">
<button class="add-order" onclick="addOrder()">Ajouter cette commande</button>
<button class="reset" onclick="resetTotal()">RESET</button>
</div>

<div class="bottom-bar">
    <div class="grand-total">Total Panier: <span id="grandTotal">0.00</span> €</div>
    <div class="orders">
        <h2>Commandes enregistrées :</h2>
        <ul id="orderList"></ul>
    </div>
</div>

<script>
let currentOrder = [];
let grandTotal = 0;
let maxFlavors = 0;

function calculateTotal() {
    let total = 0;
    document.querySelectorAll('.product.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#iceChoice .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#scoopChoice .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#flavorChoice .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#nappageSection .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#toppingSection .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#optionsSection .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.querySelectorAll('#miniFlavor .option.selected').forEach(btn => total += parseFloat(btn.dataset.price||0));
    document.getElementById('total').innerText = total.toFixed(2);
    return total;
}

function toggle(btn){ btn.classList.toggle('selected'); updateCurrentOrder(); }
function toggleFlavor(btn){ 
    if(btn.classList.contains('selected')) btn.classList.remove('selected');
    else {
        let selectedCount = document.querySelectorAll('#flavorChoice .option.selected').length;
        if(selectedCount>=maxFlavors){ alert('Nombre de parfums max atteint'); return; }
        btn.classList.add('selected');
    }
    updateCurrentOrder();
}
function toggleMiniGlace(btn){ 
    btn.classList.toggle('selected'); 
    if(btn.classList.contains('selected')) showSection('miniFlavor');
    else { hideSection('miniFlavor'); document.querySelectorAll('#miniFlavor .option.selected').forEach(b=>b.classList.remove('selected')); }
    updateCurrentOrder();
}
function toggleMiniFlavor(btn){
    if(btn.classList.contains('selected')) btn.classList.remove('selected');
    else { if(document.querySelectorAll('#miniFlavor .option.selected').length>=1){ alert('Un seul parfum mini glace'); return; } btn.classList.add('selected'); }
    updateCurrentOrder();
}

function selectProduct(btn){
    document.querySelectorAll('.product').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    if(btn.innerText==='Glace'){
        hideSection('nappageSection'); hideSection('toppingSection'); hideSection('optionsSection');
        showSection('iceChoice'); hideSection('scoopChoice'); hideSection('flavorChoice'); hideSection('miniFlavor');
    } else { hideAllGlaceSections(); }
    updateCurrentOrder();
}

function selectSingle(btn, type){
    document.querySelectorAll(`#${type==='iceType'?'iceChoice':'scoopChoice'} .option`).forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    if(type==='iceType'){ showSection('scoopChoice'); }
    if(type==='scoop'){ maxFlavors=parseInt(btn.innerText); showSection('flavorChoice'); }
    updateCurrentOrder();
}

function updateCurrentOrder(){
    currentOrder=[];
    document.querySelectorAll('.product.selected').forEach(btn=>currentOrder.push(btn.innerText));
    document.querySelectorAll('#iceChoice .option.selected').forEach(btn=>currentOrder.push(btn.innerText));
    document.querySelectorAll('#scoopChoice .option.selected').forEach(btn=>currentOrder.push(btn.innerText));
    document.querySelectorAll('#flavorChoice .option.selected').forEach(btn=>currentOrder.push('Glace: '+btn.innerText));
    document.querySelectorAll('#nappageSection .option.selected').forEach(btn=>currentOrder.push(btn.innerText));
    document.querySelectorAll('#toppingSection .option.selected').forEach(btn=>currentOrder.push(btn.innerText));
    document.querySelectorAll('#optionsSection .option.selected').forEach(btn=>currentOrder.push(btn.innerText));
    document.querySelectorAll('#miniFlavor .option.selected').forEach(btn=>currentOrder.push('Mini: '+btn.innerText));
    calculateTotal();
}

function addOrder(){
    const mainProductSelected = document.querySelectorAll('.product.selected').length > 0;
    if(!mainProductSelected){
        alert('Veuillez sélectionner un produit principal : Crêpe, Panini ou Glace.');
        return;
    }
    const selectedProduct = document.querySelector('.product.selected').innerText;
    if(selectedProduct === 'Glace'){
        const iceTypeSelected = document.querySelectorAll('#iceChoice .option.selected').length > 0;
        const scoopSelected = document.querySelectorAll('#scoopChoice .option.selected').length > 0;
        if(!iceTypeSelected || !scoopSelected){
            alert('Veuillez choisir Pot ou Cornet et le nombre de boules pour la glace.');
            return;
        }
    }

    // Vérification mini glace pour Crêpe ou Panini
    if((selectedProduct === 'Crêpe' || selectedProduct === 'Panini Gelato') &&
       document.querySelector('#optionsSection .option[data-type="mini-glace"].selected')) {
        const miniFlavorSelected = document.querySelectorAll('#miniFlavor .option.selected').length > 0;
        if(!miniFlavorSelected){
            alert('Veuillez choisir un parfum pour la mini glace.');
            return;
        }
    }

    let orderTotal=calculateTotal();
    grandTotal+=orderTotal;

    let li=document.createElement('li'); li.style.display='flex'; li.style.alignItems='center';
    let span=document.createElement('span'); span.innerText=currentOrder.join(' + ')+' = '+orderTotal.toFixed(2)+'€';
    li.appendChild(span);

    let delBtn=document.createElement('button'); delBtn.innerText='Supprimer'; delBtn.style.marginLeft='10px';
    delBtn.style.background='#c0392b'; delBtn.style.color='white'; delBtn.style.border='none'; delBtn.style.borderRadius='5px';
    delBtn.style.padding='3px 6px'; delBtn.onclick=function(){ grandTotal-=orderTotal; document.getElementById('grandTotal').innerText=grandTotal.toFixed(2); li.remove(); };
    li.appendChild(delBtn);

    document.getElementById('orderList').appendChild(li);
    document.getElementById('grandTotal').innerText=grandTotal.toFixed(2);

    resetCurrentOrder(); // seulement la commande en cours
}

// RESET complet : supprime tout
function resetTotal(){
    document.querySelectorAll('button.selected').forEach(b=>b.classList.remove('selected'));
    currentOrder = [];
    document.getElementById('orderList').innerHTML = '';
    grandTotal = 0;
    document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
    calculateTotal();
    hideAllGlaceSections();
    hideSection('miniFlavor');
}

function resetCurrentOrder(){
    document.querySelectorAll('button.selected').forEach(b=>b.classList.remove('selected'));
    currentOrder = [];
    calculateTotal();
    hideAllGlaceSections();
    hideSection('miniFlavor');
}

function hideSection(id){ document.getElementById(id).className='hidden'; }
function showSection(id){ document.getElementById(id).className='section'; }
function hideAllGlaceSections(){ hideSection('iceChoice'); hideSection('scoopChoice'); hideSection('flavorChoice'); showSection('nappageSection'); showSection('toppingSection'); showSection('optionsSection'); }
</script>

</body>
</html>
