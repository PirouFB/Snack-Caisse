<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ed7985">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caisse</title>

<link rel="stylesheet" href="style.css">

<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

</head>

<body>

<div id="paymentModal" class="hidden">
  <div class="modal-content">
    <h2>Mode de paiement</h2>

    <button onclick="selectPayment('Espèces')">💵 Espèces</button>
    <button onclick="selectPayment('CB')">💳 CB</button>
    <button onclick="selectPayment('Autre moyen de paiement')">📱 Autre moyen de paiement</button>  </div>
</div>

<div id="customModal" class="hidden">
  <div class="modal-content">
    <h2>Montant libre</h2>

    <input id="customInput" type="number" step="0.01" placeholder="0.00€" style="padding:10px;font-size:18px;width:150px;text-align:center;">

    <br><br>

    <button onclick="addCustomAmount()">Ajouter</button>
    <button onclick="closeCustomAmount()">Annuler</button>
  </div>
</div>

<div id="discountModal" class="hidden">
  <div class="modal-content">
    <h2>Réduction (%)</h2>

    <input id="discountInput" type="number" step="1" placeholder="10"
      style="padding:10px;font-size:18px;width:150px;text-align:center;">

    <br><br>

    <button onclick="applyDiscount()">Appliquer</button>
    <button onclick="closeDiscount()">Annuler</button>
  </div>
</div>

<div class="container">

  <div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="total">0.00€</div>
    <img src="logo-manga.png">
  </div>

<div id="menu" class="menu hidden">
  <div onclick="showCaisse()">🧾 CAISSE</div>
  <div onclick="showPrepa()">👨‍🍳 PREPA</div>
  <div onclick="showBilan()">📊 BILAN</div> <!-- ✅ AJOUT -->
</div>

  <!-- CAISSE -->
  <div id="caisseView">

    <div class="row center">

      <div class="card" onclick="selectMain('Crêpes',2.5,this)">
        <img src="icon-crepe.png">
        <p>Crêpes</p>
      </div>

      <div class="card" onclick="selectMain('Panini',3.5,this)">
        <img src="icon-panini.png">
        <p>Panini</p>
      </div>

      <div class="card" onclick="selectMain('Glace',0,this)">
        <img src="icon-glace.png">
        <p>Glace</p>
      </div>

      <div class="card" onclick="selectMain('Boissons',0,this)">
        <img src="icon-boisson.png">
        <p>Boissons</p>
      </div>

      <div class="card" onclick="selectMain('Gateau',0,this)">
        <img src="icon-gateau.png">
        <p>Gateau</p>
      </div>

      <div class="card" onclick="selectMain('Sale',0,this)">
        <img src="icon-sale.png">
        <p>Salé</p>
      </div>

    </div>

    <div id="dynamic"></div>

<div class="footer">

  <div class="action-bar">
    <button class="btn-add" onclick="addToCart()">Ajouter</button>
    <button class="btn-reset" onclick="resetAll()">Reset</button>
    <button class="btn-other" onclick="openCustomAmount()">Autres</button>
    <button class="btn-discount" onclick="openDiscount()">Réduction</button>
  </div>

  <div id="cart"></div>

  <button class="validate" onclick="validateCart()">Valider</button>

</div>

  <!-- BILAN -->
  <div id="bilanView" class="hidden">
    <h2>📊 Bilan du jour</h2>
    <div id="bilan"></div>
  <button onclick="exportPDF()">Exporter PDF</button>
  <button onclick="endDay()">Fin de journée</button>
  </div>

<!-- PREPA -->
<div id="prepaView" class="hidden">
  <h2>👨‍🍳 Préparation</h2>
  <div id="prepa"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
