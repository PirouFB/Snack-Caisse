<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ed7985">

<meta charset="UTF-8">
<meta name="viewport" content="width=768, initial-scale=1.0">

<title>Caisse</title>

<link rel="stylesheet" href="style.css">

<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

</head>

<body>

<div class="container">

  <div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div id="total">0.00€</div>

    <img src="logo-manga.png">
  </div>

  <!-- MENU -->
  <div id="menu" class="menu hidden">
    <div onclick="showCaisse()">🧾 CAISSE</div>
    <div onclick="showBilan()">📊 BILAN</div>
  </div>

  <!-- CAISSE -->
  <div id="caisseView">

    <div class="row center">
      <div class="card" onclick="selectMain('Crêpes',2.5,this)">
        <img src="icon-crepe.png">
        <p>Crêpes</p>
      </div>

      <div class="card" onclick="selectMain('Panini',3.5,this)">
        <img src="icon-panini.png">
        <p>Panini</p>
      </div>

      <div class="card" onclick="selectMain('Glace',0,this)">
        <img src="icon-glace.png">
        <p>Glace</p>
      </div>
    </div>

    <div id="dynamic"></div>

    <div class="footer">
      <button onclick="addToCart()">Ajouter</button>
      <button onclick="validateCart()">Valider</button>
      <button class="reset" onclick="resetAll()">RESET</button>
      <div id="cart"></div>
    </div>

  </div>

  <!-- BILAN -->
  <div id="bilanView" class="hidden">
    <h2>📊 Bilan du jour</h2>
    <div id="bilan"></div>
    <button onclick="endDay()">Fin de journée</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
