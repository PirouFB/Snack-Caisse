<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=768, initial-scale=1.0">

<title>La Vague Sucrée</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#ed7985">

</head>

<body>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sideMenu">
  <div onclick="showPage('caisse')">💰 Caisse</div>
  <div onclick="showPage('bilan')">📊 Bilan</div>
</div>

<div class="container" id="caissePage">

  <div class="header">
    <img src="logo-vague.png">
    <div id="total">0.00€</div>
    <img src="logo-manga.png">
  </div>

  <div class="main-products">

    <div class="card big" onclick="selectMain('Crêpes',2.5,this)">
      <img src="icon-crepe.png"><p>Crêpes</p>
    </div>

    <div class="card big" onclick="selectMain('Panini',3.5,this)">
      <img src="icon-panini.png"><p>Panini</p>
    </div>

    <div class="card big" onclick="selectMain('Glace',0,this)">
      <img src="icon-glace.png"><p>Glace</p>
    </div>

    <!-- ✅ NOUVEAU -->
    <div class="card big" onclick="selectMain('Boissons',0,this)">
      <img src="icon-boissons.png"><p>Boissons</p>
    </div>

  </div>

  <div id="dynamic"></div>

  <div class="footer">
    <button onclick="addToCart()">🛒 Ajouter</button>
    <button class="reset" onclick="resetAll()">Reset</button>

    <div id="cart"></div>
    <div id="cartTotal">💰 Total panier : 0.00€</div>

    <button class="validate" onclick="validerCommande()">💳 Valider</button>
  </div>

</div>

<div class="container" id="bilanPage" style="display:none;">
  <h2>📊 Bilan de la journée</h2>
  <div id="bilanContent"></div>
  <button onclick="resetJournee()">🔄 Fin de journée</button>
</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
